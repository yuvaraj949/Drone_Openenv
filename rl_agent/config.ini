# PEDRA-inspired hyperparameter config for the DDQN agent
# Reference: aqeelanwar/PEDRA/configs/DeepQLearning.cfg
# Adapted for: multi-drone grid environment (no AirSim)

[general]
# Task to train on: easy | medium | hard
task = easy

# Random seed (set to -1 for random)
seed = 42

# Training device: cpu | cuda
device = cpu

# Number of training episodes
max_episodes = 500

# Max steps per episode (overridden by env if lower)
max_steps_per_episode = 50

# Log level: INFO | DEBUG
log_level = INFO

[network]
# Hidden layer sizes (comma-separated)
hidden_sizes = 256, 256

# Activation: relu | tanh | elu
activation = relu

# Dropout rate during training
dropout_rate = 0.0

[dqn]
# Replay buffer capacity (PEDRA default: buffer_len = 10000)
buffer_len = 10000

# Mini-batch size (PEDRA default: batch_size = 64)
batch_size = 64

# Discount factor (PEDRA default: gamma = 0.99)
gamma = 0.99

# Learning rate (PEDRA default: learning_rate = 0.001)
learning_rate = 0.001

# Epsilon scheduling (PEDRA style: epsilon_model = linear)
epsilon_start = 1.0
epsilon_end   = 0.05
epsilon_decay_steps = 5000

# Steps to collect before training starts (PEDRA: wait_before_train)
wait_before_train = 500

# Train every N steps (PEDRA: train_interval)
train_interval = 4

# Target network update every N steps (PEDRA: update_target_interval)
update_target_interval = 500

[logging]
# Save a checkpoint every N episodes
save_every_episodes = 100

# TensorBoard log directory
tensorboard_dir = runs/ddqn

# Model save directory
model_dir = models/ddqn
