name: drone_dispatch_openenv
version: "1.0.0"
description: >
  Autonomous Drone Dispatcher — A real-world logistics simulation where
  AI agents must coordinate a fleet of drones, manage battery levels,
  and avoid mid-air collisions in a dynamic urban airspace.

# Main schemas for validation
observation_type: environment.models.Observation
action_type: environment.models.Action
reward_type: environment.models.Reward

# Constraints
max_episode_steps: 50

# Tasks definition
tasks:
  - name: easy
    description: "3 drones, 3x3 grid, zero obstacles. Basic navigation check."
    max_steps: 30

  - name: medium
    description: "5 drones, 4x4 grid, battery drains + bottleneck zones (restricted capacity)."
    max_steps: 40

  - name: hard
    description: "10 drones, 5x5 grid, dynamic No-Fly Zones (NFZ) + emergency medical priorities."
    max_steps: 50

# Grader configuration
grader:
  module: environment.graders
  function: grade_task
  score_range: [0.0, 1.0]

# Deployment
agent:
  baseline: inference.py
  type: openai
  notes: "Uses a Greedy-BFS baseline with an LLM fallback for coordination."
